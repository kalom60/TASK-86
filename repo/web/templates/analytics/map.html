<link rel="stylesheet" href="/static/css/leaflet.css">

<div class="d-flex align-items-center justify-content-between mb-4">
  <div>
    <h2 class="h4 mb-0">Geospatial Map</h2>
    <p class="text-muted small mb-0">District schools, distribution centers, and density overlays</p>
  </div>
</div>

<!-- ============================================================
     Map Controls
============================================================= -->
<div class="row g-2 align-items-end mb-3">

  <!-- Layer selector -->
  <div class="col-auto">
    <label for="layerSelect" class="form-label form-label-sm">Layer</label>
    <div class="btn-group" role="group" aria-label="Layer selector">
      <input type="radio" class="btn-check" name="layerRadio" id="layer-all" value="" autocomplete="off" checked>
      <label class="btn btn-outline-secondary btn-sm" for="layer-all">All</label>

      <input type="radio" class="btn-check" name="layerRadio" id="layer-school" value="school" autocomplete="off">
      <label class="btn btn-outline-secondary btn-sm" for="layer-school">Schools</label>

      <input type="radio" class="btn-check" name="layerRadio" id="layer-dist" value="distribution_center" autocomplete="off">
      <label class="btn btn-outline-secondary btn-sm" for="layer-dist">Distribution Centers</label>

      <input type="radio" class="btn-check" name="layerRadio" id="layer-density" value="density" autocomplete="off">
      <label class="btn btn-outline-secondary btn-sm" for="layer-density">Density Grid</label>
    </div>
    <!-- Hidden select kept for JS compatibility -->
    <select id="layerSelect" class="d-none">
      <option value="">All Locations</option>
      <option value="school">Schools</option>
      <option value="distribution_center">Distribution Centers</option>
      <option value="density">Density Grid</option>
    </select>
  </div>

  <!-- Grid computation controls -->
  <div class="col-auto">
    <label for="gridSizeInput" class="form-label form-label-sm">Grid size (km)</label>
    <div class="input-group input-group-sm">
      <input id="gridSizeInput" type="number" class="form-control" value="10" min="1" max="100" step="1" style="width:90px;">
    </div>
  </div>

  <div class="col-auto">
    <label for="metricInput" class="form-label form-label-sm">Metric</label>
    <div class="input-group input-group-sm">
      <input id="metricInput" type="text" class="form-control" value="count" placeholder="count" style="width:100px;">
    </div>
  </div>

  <div class="col-auto">
    <button id="computeGridBtn" class="btn btn-outline-secondary btn-sm" type="button">
      <i class="bi bi-arrow-repeat me-1"></i> Compute Grid
    </button>
  </div>

  <div class="col-auto">
    <button id="loadLayerBtn" class="btn btn-primary btn-sm" type="button">
      <i class="bi bi-layers me-1"></i> Load Layer
    </button>
  </div>

  <div class="col-auto">
    <span id="mapStatus" class="text-muted small"></span>
  </div>

</div>

<!-- ============================================================
     Map Container + Legend
============================================================= -->
<div class="position-relative">
  <div id="map" style="height:600px;border-radius:8px;overflow:hidden;"></div>

  <!-- Legend: Bootstrap card positioned bottom-right -->
  <div class="card position-absolute" style="bottom:16px;right:16px;z-index:1000;min-width:160px;">
    <div class="card-body p-2">
      <p class="fw-semibold small mb-2">Legend</p>
      <div class="d-flex align-items-center gap-2 mb-1">
        <span style="display:inline-block;width:12px;height:12px;background:#4a6cf7;border-radius:50%;flex-shrink:0;"></span>
        <span class="small">School</span>
      </div>
      <div class="d-flex align-items-center gap-2 mb-1">
        <span style="display:inline-block;width:12px;height:12px;background:#f59e0b;border-radius:50%;flex-shrink:0;"></span>
        <span class="small">Distribution Center</span>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span style="display:inline-block;width:12px;height:12px;background:#ef4444;border-radius:2px;flex-shrink:0;"></span>
        <span class="small">Density Cell</span>
      </div>
    </div>
  </div>
</div>

<script>
// Sync radio buttons to hidden select for map.js compatibility
document.querySelectorAll('input[name="layerRadio"]').forEach(function(radio) {
  radio.addEventListener('change', function() {
    document.getElementById('layerSelect').value = this.value;
  });
});
</script>
<script src="/static/js/leaflet.js"></script>
<script src="/static/js/map.js"></script>
