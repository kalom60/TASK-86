{{define "content"}}
{{if .Error}}
<div class="alert alert-danger" role="alert">{{.Error}}</div>
{{end}}

<div class="d-flex align-items-center justify-content-between mb-4">
  <h2 class="h4 mb-0">Checkout</h2>
</div>

<div
  x-data="{
    items: [],
    addItem(materialID, title, qty, unitPrice) {
      const existing = this.items.find(i => i.materialID === materialID);
      if (existing) {
        existing.qty = parseInt(qty) || 1;
      } else {
        this.items.push({ materialID, title, qty: parseInt(qty) || 1, unitPrice: parseFloat(unitPrice) || 0 });
      }
    },
    removeItem(materialID) {
      this.items = this.items.filter(i => i.materialID !== materialID);
    },
    get total() {
      return this.items.reduce((sum, i) => sum + (i.qty * i.unitPrice), 0).toFixed(2);
    },
    get isEmpty() {
      return this.items.length === 0;
    }
  }">

  <!-- Items injected from server if query params present -->
  {{range .CartItems}}
  <div x-init="addItem({{.MaterialID}}, '{{.Title}}', {{.Qty}}, {{.UnitPrice}})"></div>
  {{end}}

  <!-- Items table -->
  <div x-show="!isEmpty">
    <div class="card mb-3">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle mb-0" aria-label="Cart items">
            <thead>
              <tr>
                <th scope="col">Material</th>
                <th scope="col">Unit Price</th>
                <th scope="col">Qty</th>
                <th scope="col">Line Total</th>
                <th scope="col"></th>
              </tr>
            </thead>
            <tbody>
              <template x-for="item in items" :key="item.materialID">
                <tr>
                  <td x-text="item.title"></td>
                  <td x-text="'$' + item.unitPrice.toFixed(2)"></td>
                  <td>
                    <input
                      class="form-control form-control-sm"
                      style="width: 4.5rem;"
                      type="number"
                      min="1"
                      x-model.number="item.qty"
                      aria-label="Quantity">
                  </td>
                  <td x-text="'$' + (item.qty * item.unitPrice).toFixed(2)"></td>
                  <td>
                    <button
                      class="btn btn-outline-danger btn-sm"
                      type="button"
                      x-on:click="removeItem(item.materialID)"
                      aria-label="Remove item">
                      <i class="bi bi-trash" aria-hidden="true"></i>
                    </button>
                  </td>
                </tr>
              </template>
            </tbody>
            <tfoot>
              <tr>
                <td colspan="3" class="text-end"><strong>Order Total</strong></td>
                <td><strong class="fw-bold fs-5" x-text="'$' + total"></strong></td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>

    <!-- Place order form (dynamically builds hidden fields from Alpine state) -->
    <form
      method="POST"
      action="/orders"
      hx-post="/orders"
      hx-target="#cart-error"
      hx-swap="innerHTML"
      hx-indicator="#cart-spinner"
      x-on:submit="
        items.forEach(item => {
          let mid = document.createElement('input');
          mid.type = 'hidden'; mid.name = 'material_id'; mid.value = item.materialID;
          $el.appendChild(mid);

          let qty = document.createElement('input');
          qty.type = 'hidden'; qty.name = 'qty'; qty.value = item.qty;
          $el.appendChild(qty);

          let price = document.createElement('input');
          price.type = 'hidden'; price.name = 'unit_price'; price.value = item.unitPrice;
          $el.appendChild(price);
        });
      ">
      <div id="cart-error" class="mt-3"></div>
      <div class="d-flex justify-content-between align-items-center mt-2">
        <a class="btn btn-outline-secondary" href="/materials">Continue Browsing</a>
        <button
          class="btn btn-primary btn-lg w-100 ms-3"
          type="submit"
          hx-on::before-request="this.disabled=true"
          hx-on::after-request="this.disabled=false">
          <span class="spinner-border spinner-border-sm htmx-indicator me-1" id="cart-spinner" role="status" aria-hidden="true"></span>
          Place Order — $<span x-text="total"></span>
        </button>
      </div>
    </form>
  </div>

  <!-- Empty cart state -->
  <div x-show="isEmpty" class="text-center py-5">
    <i class="bi bi-cart3 fs-1 text-muted d-block mb-3" aria-hidden="true"></i>
    <p class="text-muted mb-3">Your cart is empty.</p>
    <a class="btn btn-primary" href="/materials">Browse Materials</a>
  </div>

</div>
{{end}}
